[phases.setup]
nixPkgs = ["python312", "git", "git-lfs"]

[phases.install]
cmds = [
  "git lfs install",
  "git lfs pull || true",
  "pip install -r requirements.txt",
  "python scripts/ensure_model.py",
]

[start]
cmd = "python scripts/ensure_model.py && gunicorn desercion_escolar.wsgi --bind 0.0.0.0:$PORT"
